<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Your Capsule</title>
<style>
  body { font-family: -apple-system, Arial, sans-serif; max-width: 520px; margin: 60px auto; padding: 0 20px; text-align: center; color: #1a1a1a; }
  #countdown { font-size: 40px; font-weight: 700; margin: 30px 0 10px; letter-spacing: 1px; }
  #status { font-size: 15px; color: #666; }
  #content { margin-top: 30px; padding: 24px; background: #f4f4f4; border-radius: 10px; font-size: 18px; line-height: 1.5; text-align: left; white-space: pre-wrap; }
  #photo { max-width: 100%; border-radius: 10px; margin-top: 20px; display: none; }
  .meta { margin-top: 40px; font-size: 12px; color: #999; }
  .lock-icon { font-size: 46px; }
</style>
</head>
<body>
  <div id="locked-view">
    <div class="lock-icon">🔒</div>
    <h1>Locked</h1>
    <div id="teaser" style="font-size:16px; color:#555; margin-bottom:10px;"></div>
    <div id="countdown">--:--:--:--</div>
    <div id="status">Checking with the server...</div>
  </div>

  <div id="unlocked-view" style="display:none;">
    <div class="lock-icon">🎁</div>
    <h1>Unlocked!</h1>
    <div id="content"></div>
    <img id="photo" alt="Capsule photo">
  </div>

  <div class="meta" id="viewcount"></div>

<script>
const params = new URLSearchParams(window.location.search);
const capsuleId = params.get('id');

if (!capsuleId) {
  document.body.innerHTML = '<p>No capsule ID provided.</p>';
}

function formatCountdown(totalSeconds) {
  const d = Math.floor(totalSeconds / 86400);
  const h = Math.floor((totalSeconds % 86400) / 3600);
  const m = Math.floor((totalSeconds % 3600) / 60);
  const s = Math.floor(totalSeconds % 60);
  return `${d}d ${h}h ${m}m ${s}s`;
}

async function checkCapsule() {
  const res = await fetch(`/api/capsules/${capsuleId}`);
  if (!res.ok) {
    document.getElementById('status').textContent = 'Capsule not found.';
    return;
  }
  const data = await res.json();
  document.getElementById('viewcount').textContent = `Checked ${data.viewCount} time(s) — every check hits the server, never the visitor's own clock.`;

  if (data.locked) {
    document.getElementById('teaser').textContent = data.lockMessage || '';
    document.getElementById('countdown').textContent = formatCountdown(data.secondsRemaining);
    document.getElementById('status').textContent =
      data.secondsRemaining > 0
        ? "The server refuses to send the content — it isn't just hidden, it was never sent."
        : "Unlocking...";
  } else {
    document.getElementById('locked-view').style.display = 'none';
    document.getElementById('unlocked-view').style.display = 'block';
    document.getElementById('content').textContent = data.unlockMessage || '';
    if (data.photo) {
      const img = document.getElementById('photo');
      img.src = data.photo;
      img.style.display = 'block';
    }
  }
}

checkCapsule();
setInterval(checkCapsule, 1000); // poll the server every second, same as a real client would
</script>
</body>
</html>
